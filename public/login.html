<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | عيادة التصوير الشعاعي</title>

    <!-- خطوط وأيقونات -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- http://localhost:3000/login.html
    http://localhost:3000/patients.htm
    http://localhost:3000/admin.html
    	http://localhost:3000 -->

    <!-- CSS -->
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <div class="login-wrapper">
        <!-- القسم الجانبي -->
        <div class="login-panel">
            <div class="panel-content">
                <i class="fas fa-x-ray panel-icon"></i>
                <h2>عيادة التصوير الشعاعي</h2>
                <p>لوحة الإدارة الاحترافية</p>
                <small>د. أحمد الخطيب</small>
            </div>
        </div>

        <!-- نموذج الدخول -->
        <div class="login-form">
            <div class="form-inner">
                <div class="form-header">
                    <i class="fas fa-lock"></i>
                    <h3>تسجيل الدخول</h3>
                </div>
                <p class="form-subtitle">أدخل كلمة المرور للمتابعة</p>

                <div class="input-group">
                    <i class="fas fa-key"></i>
                    <input type="password" id="password" placeholder="كلمة المرور" autofocus>
                </div>

                <button id="loginBtn">
                    <i class="fas fa-arrow-left-to-bracket"></i> دخول
                </button>

                <p class="error-msg" id="errorMsg"></p>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="login.js" defer></script>
</body>

</html>
